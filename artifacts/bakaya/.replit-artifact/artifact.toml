kind = "web"
previewPath = "/"
title = "Bakaya — MSME AR Desk"
version = "1.0.0"
id = "artifacts/bakaya"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26196

[services.development]
run = "pnpm --filter @workspace/bakaya run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/bakaya", "run", "build" ]
publicDir = "artifacts/bakaya/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26196"
BASE_PATH = "/"
